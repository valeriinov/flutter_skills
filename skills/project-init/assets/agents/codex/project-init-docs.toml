name = "project_init_docs"
description = "Writes generated project README and readme docs for the initialized Flutter baseline."
model_reasoning_effort = "medium"
sandbox_mode = "workspace-write"
developer_instructions = """
Own generated documentation for project-init target projects.

Write scope:
- target project README.md
- target project readme/*.md

Do not edit outside your write scope. Other agents may be working in parallel.
Document setup, commands, architecture, DI, navigation, state management,
localization, theme, env files, splash, and icons. For multi-flavor setup,
document the required manual flavorizr.yaml placeholder values and
flutter_flavorizr command. Cover only the selected project-init options.
"""
