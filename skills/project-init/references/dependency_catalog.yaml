# Tested dependency constraints for the project-init skill.
#
# These constraints are intentionally curated. The initializer should apply
# these values, then run a dependency audit that reports newer compatible
# versions or breaking-major candidates without changing constraints.

environment:
  dart: "^3.11.5"
  flutter: "^3.41.8"

dependencies:
  dartz:
    constraint: "^0.10.1"
    groups: [fixed]
  get_it:
    constraint: "^9.2.1"
    groups: [fixed]
  injectable:
    constraint: "^3.0.0"
    groups: [fixed]
  auto_route:
    constraint: "^11.1.0"
    groups: [fixed]
  easy_localization:
    constraint: "^3.0.7+1"
    groups: [fixed]
  theme_tailor_annotation:
    constraint: "^3.1.3"
    groups: [fixed]
  flutter_dotenv:
    constraint: "^6.0.1"
    groups: [fixed]
  flutter_hooks:
    constraint: "^0.21.3+1"
    groups: [fixed]
  freezed_annotation:
    constraint: "^3.1.0"
    groups: [fixed]
  json_annotation:
    constraint: "^4.11.0"
    groups: [fixed]
  intl:
    constraint: "^0.20.2"
    groups: [fixed]
  collection:
    constraint: "^1.19.1"
    groups: [fixed]
  flutter_bloc:
    constraint: "^9.1.1"
    groups: [cubit]
  flutter_riverpod:
    constraint: "^3.3.1"
    groups: [riverpod]
  dio:
    constraint: "^5.9.2"
    groups: [dio]
  pretty_dio_logger:
    constraint: "^1.4.0"
    groups: [dio]
  connectivity_plus:
    constraint: "^7.1.1"
    groups: [dio]

dev_dependencies:
  build_runner:
    constraint: "^2.15.0"
    groups: [fixed]
  json_serializable:
    constraint: "^6.13.2"
    groups: [fixed]
  freezed:
    constraint: "^3.2.5"
    groups: [fixed]
  auto_route_generator:
    constraint: "^10.5.0"
    groups: [fixed]
  injectable_generator:
    constraint: "^3.0.2"
    groups: [fixed]
  theme_tailor:
    constraint: "^3.1.3"
    groups: [fixed]
  flutter_gen_runner:
    constraint: "^5.14.1"
    groups: [fixed]
  flutter_lints:
    constraint: "^6.0.0"
    groups: [fixed]
  flutter_flavorizr:
    constraint: "^2.4.2"
    groups: [flavors]
  flutter_native_splash:
    constraint: "^2.4.7"
    groups: [splash]
  flutter_launcher_icons:
    constraint: "^0.14.4"
    groups: [launcher_icons]
